# ================== APPLICATION ==================
spring.application.name=currency-service

# ================== JPA ==================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ================== ACTUATOR ==================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ================== FEIGN ==================
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# ================== RESILIENCE4J ==================
resilience4j.circuitbreaker.instances.currencyService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.currencyService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.currencyService.slidingWindowSize=10

# ================== LOGGING ==================
logging.level.org.springframework=INFO
logging.level.com.sathya.rest=DEBUG

# ================== TRACING (ZIPKIN COMMON) ==================
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0
