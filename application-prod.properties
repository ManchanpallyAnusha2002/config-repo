spring.profiles.active=prod

# ================== SERVER ==================
server.port=9999

# ================== DATABASE (REAL DB) ==================
spring.datasource.url=jdbc:mysql://localhost:3306/currency_db
spring.datasource.username=root
spring.datasource.password=your_password

spring.jpa.hibernate.ddl-auto=none

# ================== REDIS ==================
spring.cache.type=redis
spring.redis.host=prod-redis-host
spring.redis.port=6379

# ================== EUREKA ==================
eureka.client.service-url.defaultZone=http://prod-eureka:8761/eureka
eureka.instance.prefer-ip-address=true

# ================== ZIPKIN ==================
management.zipkin.tracing.endpoint=http://zipkin-server:9411/api/v2/spans
management.tracing.sampling.probability=0.5
